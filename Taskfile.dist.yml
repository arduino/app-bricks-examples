version: "3"

vars:
  LICENSED_VERSION: '5.0.6'
  REUSE_VERSION: '5.0.2'
  LICENSE_VENV_DIR: '.venv'
  REUSE_VENV_DIR: '.reuse-venv'

tasks:
  init:license:
    desc: Recreate the environments used by the license task
    cmds:
      - |
        rm -rf "{{.LICENSE_VENV_DIR}}"
        python3 -m venv "{{.LICENSE_VENV_DIR}}"
        "{{.LICENSE_VENV_DIR}}"/bin/pip install --upgrade pip
        "{{.LICENSE_VENV_DIR}}"/bin/pip install -r requirements.txt
      - |
        rm -rf "{{.REUSE_VENV_DIR}}"
        python3 -m venv "{{.REUSE_VENV_DIR}}"
        "{{.REUSE_VENV_DIR}}"/bin/pip install --upgrade pip
        "{{.REUSE_VENV_DIR}}"/bin/pip install reuse=={{.REUSE_VERSION}}

  init:ci:
    desc: Backward-compatible alias for initializing license environments
    cmds:
      - task: init:license

  install-bricks:
    desc: Install a specific bricks version (e.g. task install-bricks -- 0.8.0rc2)
    cmds:
      - |
        VERSION={{.CLI_ARGS}}
        if [ -z "$VERSION" ]; then
          echo "Usage: task install-bricks -- <version>"
          exit 1
        fi
        "{{.LICENSE_VENV_DIR}}"/bin/pip install "https://github.com/arduino/app-bricks-py/releases/download/release%2F${VERSION}/arduino_app_bricks-${VERSION}-py3-none-any.whl"

  install:licensed:
    internal: true
    cmds:
      - |
        INSTALLED_VERSION=""
        if command -v licensed >/dev/null 2>&1; then
          INSTALLED_VERSION="$(licensed version 2>/dev/null | grep -Eo '[0-9]+(\.[0-9]+)+' | head -n1)"
        fi

        if [ "$INSTALLED_VERSION" = "{{.LICENSED_VERSION}}" ]; then
          exit 0
        fi

        if [ "${CI:-}" = "true" ]; then
          echo "Installing licensed v{{.LICENSED_VERSION}} for CI..."
          if ! gem install licensed -v {{.LICENSED_VERSION}} --no-document; then
            echo ""
            echo "============================================================"
            echo "  ERROR: licensed v{{.LICENSED_VERSION}} could not be installed in CI."
            echo ""
            echo "  Make sure the workflow provides Ruby and RubyGems correctly,"
            echo "  then retry."
            echo "============================================================"
            exit 1
          fi

          exit 0
        fi

        echo ""
        echo "============================================================"
        echo "  ERROR: licensed v{{.LICENSED_VERSION}} is required to run 'task license'."
        echo ""
        echo "  Install licensed v{{.LICENSED_VERSION}} manually, make sure it is available in PATH,"
        echo "  and then retry."
        echo ""
        echo "  Verify the installation with:"
        echo "    licensed version"
        echo "============================================================"
        exit 1

  license:
    desc: |
      Update license headers, validate REUSE compliance and check dependency licenses.
      Uses a dedicated virtualenv for REUSE and a separate one for pip dependency scanning.
      Requires licensed v{{.LICENSED_VERSION}} for dependency license checking.
      In local environments, install licensed v{{.LICENSED_VERSION}} manually before running this task.
      In CI, the task installs licensed v{{.LICENSED_VERSION}} with gem after Ruby has been set up by the workflow.
    cmds:
      - task: init:license
      - |
        "{{.REUSE_VENV_DIR}}"/bin/reuse annotate --skip-unrecognized --merge-copyrights --copyright-prefix 'spdx-string-c' --copyright 'Arduino s.r.l. and/or its affiliated companies' --exclude-year --license 'MPL-2.0'
      - '"{{.REUSE_VENV_DIR}}"/bin/reuse download --all'
      - '"{{.REUSE_VENV_DIR}}"/bin/reuse lint'
      - rm -rf "{{.REUSE_VENV_DIR}}"
      - task: install:licensed
      - |
        licensed cache
        licensed status

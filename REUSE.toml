version = 1

# Arduino-authored source, docs and assets.
# Keep this broad, but avoid swallowing vendored third-party trees.
[[annotations]]
path = [
  "README.md",
  "learn-docs/**/*.md",
  "learn-docs/**/assets/**",
  "learn-docs/_icons/**",
  "examples/**/*.py",
  "examples/**/*.ino",
  "examples/**/*.h",
  "examples/**/*.md",
  "examples/**/*.yaml",
  "examples/**/*.txt",
  "examples/**/assets/*.html",
  "examples/**/assets/*.css",
  "examples/**/assets/*.js",
  "examples/**/assets/**/*.json",
  "examples/**/assets/**/*.png",
  "examples/**/assets/**/*.jpg",
  "examples/**/assets/**/*.jpeg",
  "examples/**/assets/**/*.svg",
  "examples/**/assets/**/*.gif",
  "examples/**/assets/**/*.webp",
  "examples/**/assets/**/*.wav",
]
SPDX-FileCopyrightText = "Copyright (C) Arduino s.r.l. and/or its affiliated companies"
SPDX-License-Identifier = "MPL-2.0"

# Third-party fonts (Open Sans, Roboto) distributed under OFL-1.1
[[annotations]]
path = [
  "examples/**/assets/fonts/**/*.ttf",
  "examples/**/assets/fonts/**/*.css",
  "examples/**/assets/fonts/**/OFL.txt",
]
SPDX-FileCopyrightText = "Copyright (c) Google LLC"
SPDX-License-Identifier = "OFL-1.1"
precedence = "override"

# Arduino support modules that may live alongside third-party files in
# assets/libs/ remain first-party code and should keep the project license.
[[annotations]]
path = "examples/**/assets/libs/arduino.js"
SPDX-FileCopyrightText = "Copyright (C) Arduino s.r.l. and/or its affiliated companies"
SPDX-License-Identifier = "MPL-2.0"
precedence = "override"

# Third-party JS libraries. Keep them out of automatic header rewriting and
# cover them via annotations so their upstream headers stay untouched.
[[annotations]]
path = "examples/**/assets/libs/socket.io.min.js"
SPDX-FileCopyrightText = "Copyright (c) 2014-2024 Guillermo Rauch"
SPDX-License-Identifier = "MIT"
precedence = "override"

[[annotations]]
path = "examples/**/assets/libs/qrcode.min.js"
SPDX-FileCopyrightText = "Copyright (c) David Shim"
SPDX-License-Identifier = "MIT"
precedence = "override"

# Configuration & generated files
[[annotations]]
path = [
  ".github/**",
  ".licenses/**",
  ".gitignore",
  ".licensed.yml",
  "*.dist.yml",
  "**/requirements.txt",
  "REUSE.toml",
]
SPDX-FileCopyrightText = "Copyright (C) Arduino s.r.l. and/or its affiliated companies"
SPDX-License-Identifier = "CC0-1.0"
precedence = "override"

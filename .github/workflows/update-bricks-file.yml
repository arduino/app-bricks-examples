name: Update bricks dependency to the latest stable version
on:
  workflow_dispatch:
  schedule:
    # Run every day at 8:00 AM UTC
    - cron: '0 8 * * *'
permissions:
  contents: write
  pull-requests: write

jobs:
  update-bricks:
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: '3.13'
      TASKFILE_VERSION: 'v3.44.0'
      TASKFILE_PATH: '/home/runner/go/bin'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest stable bricks version
        id: get-latest-version
        run: |
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/arduino/app-bricks-py/releases \
            | jq -r '[.[] | select(.prerelease == false and .draft == false)][0].tag_name' \
            | sed 's/^release\///')
          echo "LATEST_RELEASE=$LATEST_RELEASE"
          if [[ ! "$LATEST_RELEASE" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $LATEST_RELEASE (expected X.Y.Z)"
            exit 1
          fi
          echo "LATEST_RELEASE=$LATEST_RELEASE" >> $GITHUB_OUTPUT

      - name: Check if there is an existing branch for the latest version
        id: check-branch
        run: |
          LATEST_RELEASE=${{ steps.get-latest-version.outputs.LATEST_RELEASE }}
          if git ls-remote --heads origin update-bricks-${LATEST_RELEASE} | grep -q update-bricks-${LATEST_RELEASE}; then
            echo "Branch update-bricks-${LATEST_RELEASE} already exists."
            echo "branch_exists=true" >> $GITHUB_OUTPUT
          fi

      - name: Check if current version is up to date
        if: steps.check-branch.outputs.branch_exists != 'true'
        id: check-update
        run: |
          LATEST_RELEASE=${{ steps.get-latest-version.outputs.LATEST_RELEASE }}
          CURRENT_VERSION=$(grep 'arduino_app_bricks' requirements.txt | sed -E 's/.*%2F([^/]+)\/.*/\1/')
          echo "CURRENT_VERSION=$CURRENT_VERSION"
          if [ "$CURRENT_VERSION" = "$LATEST_RELEASE" ]; then
            echo "No update needed. Current version is up to date."
            echo "update_needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update requirements.txt
        if: steps.check-branch.outputs.branch_exists != 'true' && steps.check-update.outputs.update_needed != 'false'
        run: |
          LATEST_RELEASE=${{ steps.get-latest-version.outputs.LATEST_RELEASE }}
          sed -i "s|arduino_app_bricks @ .*|arduino_app_bricks @ https://github.com/arduino/app-bricks-py/releases/download/release%2F${LATEST_RELEASE}/arduino_app_bricks-${LATEST_RELEASE}-py3-none-any.whl|" requirements.txt

      - name: Create Pull Request
        if: steps.check-branch.outputs.branch_exists != 'true' && steps.check-update.outputs.update_needed != 'false'
        uses: peter-evans/create-pull-request@v8
        with:
          base: main
          branch: update-bricks-${{ steps.get-latest-version.outputs.LATEST_RELEASE }}
          title: "Update bricks to ${{ steps.get-latest-version.outputs.LATEST_RELEASE }}"
          body: "This PR updates the Arduino App Bricks dependency to the latest stable version ${{ steps.get-latest-version.outputs.LATEST_RELEASE }}."
          commit-message: "chore: update bricks to ${{ steps.get-latest-version.outputs.LATEST_RELEASE }}"
          add-paths: |
            requirements.txt

      - name: Checkout PR branch
        if: steps.check-branch.outputs.branch_exists != 'true' && steps.check-update.outputs.update_needed != 'false'
        uses: actions/checkout@v4
        with:
          ref: update-bricks-${{ steps.get-latest-version.outputs.LATEST_RELEASE }}

      - name: Set up Python
        if: steps.check-branch.outputs.branch_exists != 'true' && steps.check-update.outputs.update_needed != 'false'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Ruby
        if: steps.check-branch.outputs.branch_exists != 'true' && steps.check-update.outputs.update_needed != 'false'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ruby

      - name: Install licensed
        if: steps.check-branch.outputs.branch_exists != 'true' && steps.check-update.outputs.update_needed != 'false'
        uses: licensee/setup-licensed@v1.3.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          version: 5.x

      - name: Update license
        if: steps.check-branch.outputs.branch_exists != 'true' && steps.check-update.outputs.update_needed != 'false'
        run: |
          which task || curl -sSfL https://taskfile.dev/install.sh | sh -s -- -b ${{ env.TASKFILE_PATH }} ${{ env.TASKFILE_VERSION }}
          export PATH="${{ env.TASKFILE_PATH }}:$PATH"
          task license

      - name: Commit and push changes
        if: steps.check-branch.outputs.branch_exists != 'true' && steps.check-update.outputs.update_needed != 'false'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: update license files" || echo "No changes to commit"
          git push origin update-bricks-${{ steps.get-latest-version.outputs.LATEST_RELEASE }}
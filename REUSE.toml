version = 1

# Arduino images, icons, audio & docs assets (binary files that cannot embed headers)
[[annotations]]
path = [
  "examples/**/assets/img/**",
  "examples/**/assets/audio/**",
  "examples/**/assets/docs_assets/**",
  "examples/**/assets/docs_images/**",
  "examples/**/assets/*.png",
  "learn-docs/**/assets/**",
  "learn-docs/_icons/**",
]
SPDX-FileCopyrightText = "Copyright (C) Arduino s.r.l. and/or its affiliated companies"
SPDX-License-Identifier = "MPL-2.0"
precedence = "override"

# Third-party fonts (Open Sans, Roboto) distributed under OFL-1.1
[[annotations]]
path = [
  "examples/**/assets/fonts/**/*.ttf",
  "examples/**/assets/fonts/**/OFL.txt",
]
SPDX-FileCopyrightText = "Copyright (c) Google LLC"
SPDX-License-Identifier = "OFL-1.1"
precedence = "override"

# Third-party JS libraries. Keep them out of automatic header rewriting and
# cover them via annotations so their upstream headers stay untouched.
[[annotations]]
path = "examples/**/assets/libs/socket.io.min.js"
SPDX-FileCopyrightText = "Copyright (c) 2014-2024 Guillermo Rauch"
SPDX-License-Identifier = "MIT"
precedence = "override"

[[annotations]]
path = "examples/**/assets/libs/qrcode.min.js"
SPDX-FileCopyrightText = "Copyright (c) David Shim"
SPDX-License-Identifier = "MIT"
precedence = "override"

# Arduino source files under assets (HTML/CSS served as static content)
[[annotations]]
path = [
  "examples/**/assets/*.html",
  "examples/**/assets/*.css",
]
SPDX-FileCopyrightText = "Copyright (C) Arduino s.r.l. and/or its affiliated companies"
SPDX-License-Identifier = "MPL-2.0"

# App metadata & text content authored by Arduino
[[annotations]]
path = [
  "examples/**/app.yaml",
  "examples/**/sketch/sketch.yaml",
  "examples/**/README.md",
  "examples/**/python/system_prompt.txt",
  "learn-docs/**/*.md",
]
SPDX-FileCopyrightText = "Copyright (C) Arduino s.r.l. and/or its affiliated companies"
SPDX-License-Identifier = "MPL-2.0"

# Configuration & generated files
[[annotations]]
path = [
  ".gitignore",
  ".github/**",
  ".licensed.yml",
  ".licenses/**",
  "Taskfile.dist.yml",
  "requirements.txt",
  "examples/**/python/requirements.txt",
  "REUSE.toml",
]
SPDX-FileCopyrightText = "Copyright (C) Arduino s.r.l. and/or its affiliated companies"
SPDX-License-Identifier = "CC0-1.0"

# Root documentation
[[annotations]]
path = "README.md"
SPDX-FileCopyrightText = "Copyright (C) Arduino s.r.l. and/or its affiliated companies"
SPDX-License-Identifier = "MPL-2.0"

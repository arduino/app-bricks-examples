<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edge AI Assistant</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <main>
        <div class="header">
          <div class="header-left">
            <img src="img/RGB-Arduino-Logo-Color-Inline-Loop.svg" alt="Arduino Logo" class="arduino-logo" />
            <p class="arduino-text">Edge AI Assistant</p>
          </div>
          <div class="header-right">
            <button id="clear-chat-button-header">
              <img
                src="img/reset.svg"
                alt="Reset"
                style="width: 20px; height: 20px; padding-right: 8px; vertical-align: middle" />Reset chat
            </button>
          </div>
        </div>
        <div class="main-content">
          <div id="chat-container">
            <div id="chat-messages-container">
              <div id="empty-chat-container">
                <div class="icon-and-greeting">
                  <img src="img/green-stars.svg" alt="Green Stars" />
                  <p class="greeting">Hi there!</p>
                </div>
                <p class="prompt-question">What’s on your mind?</p>
              </div>
              <div id="messages"></div>
            </div>
            <div class="input-container">
              <div class="textarea-wrapper">
                <textarea id="user-input" placeholder="Type your message here..."></textarea>
              </div>
              <button id="send-button">
                <img src="img/send.svg" alt="Send" />
              </button>
            </div>
            <p class="disclaimer">Responses are generated from pre-existing knowledge. No live web access.</p>
            <button id="stop-stream-button" hidden>Stop Stream</button>
          </div>
        </div>
      </main>
    </div>
    <div id="error-banner" style="display: none">
      <p id="error-message"></p>
    </div>
    <script src="libs/socket.io.min.js"></script>
    <script src="libs/arduino.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script src="app.js"></script>
  </body>
</html>
